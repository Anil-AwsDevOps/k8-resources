apiVersion: apps/v1
kind: Deployment 
metadata:
  name: myreplicaset
  # these labels are replicaset labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
  annotations:
    kubernetes.io/change-cause: "moving to 1.29"
spec:
  replicas: 2
  selector:
  # using thiese labels replicaset selects the pods
    matchLabels:
     project: roboshop
     purpose: rs-demo
     tier: frontend
     # this is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.29
