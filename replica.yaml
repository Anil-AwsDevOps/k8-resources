apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myreplicaset
  # these labels are replicaset labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
spec:
  replicas: 10
  selector:
  # using thiese labels replicaset selects the pods
    matchLabels:
     project: roboshop
     purpose: rs-demo
     tier: frontend
     # this is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
    spec:
      containers:
        - name: nginx
          image: nginx
